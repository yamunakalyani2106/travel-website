<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Image Scroll</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .image-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scroll-behavior: smooth;
            width: 300px;
            height: 500px;
        }

        .image-container::-webkit-scrollbar {
            display: none;
        }

        .image-container img {
            width: 100%;
            height: auto;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="scroll-wrapper">
        <button id="upBtn">⬆</button>
        <div class="image-container">
            <img src="thar.jpg" alt="Image 1">
            <img src="thar.jpg" alt="Image 2">
            <img src="thar.jpg" alt="Image 3">
            <img src="thar.jpg" alt="Image 4">
            <img src="thar.jpg" alt="Image 5">
        </div>
        <button id="downBtn">⬇</button>
    </div>

    <script>
        const container = document.querySelector('.image-container');
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');

        downBtn.addEventListener('click', () => {
            container.scrollBy({ top: 150, behavior: 'smooth' });
        });

        upBtn.addEventListener('click', () => {
            container.scrollBy({ top: -150, behavior: 'smooth' });
        });

        // Auto-scroll every 2 seconds
        setInterval(() => {
            container.scrollBy({ top: 150, behavior: 'smooth' });
        }, 2000);
    </script>

</body>
</html>
